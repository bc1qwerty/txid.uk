<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>txid.uk — Bitcoin Block Explorer</title>
<meta name="description" content="Bitcoin Block Explorer & Mempool Viewer. 비트코인 블록 탐색기 & 멤풀 뷰어.">
<meta name="theme-color" content="#f7931a">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
</head>
<body>
<!-- SVG 아이콘 스프라이트 -->
<div id="svg-sprites" style="display:none"></div>
<script>
fetch("static/icons.svg").then(r=>r.text()).then(t=>{
  document.getElementById("svg-sprites").innerHTML=t;
  document.getElementById("svg-sprites").style.display="";
});
</script>

<!-- Header -->
<header id="header">
  <div class="nav-top">
    <a href="#/" class="logo">txid.uk</a>
    <div class="nav-right">
      <div id="nav-links">
        <a href="#/" data-page="" data-ko="홈" data-en="Home" data-ja="ホーム" data-ja="ホーム">홈</a>
        <a href="#/mining" data-page="mining" data-ko="채굴" data-en="Mining" data-ja="マイニング" data-ja="マイニング">채굴</a>
      </div>
      <span id="monitor-badge" class="monitor-badge" style="display:none" title="모니터링 중">0</span>
      <button id="fee-calc-header-btn" onclick="App.openFeeCalc()" title="수수료 계산기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="11" y2="14"/><line x1="8" y1="18" x2="11" y2="18"/></svg></button>
    <div id="lang-wrap">
      <button id="lang-btn" onclick="App.toggleLangMenu()">KO</button>
      <div id="lang-menu">
        <button onclick="App.setLang('ko')">KO</button>
        <button onclick="App.setLang('en')">EN</button>
        <button onclick="App.setLang('ja')">日</button>
      </div>
    </div>
      <button id="theme-btn" onclick="App.toggleTheme()" title="테마 전환"></button>
    </div>
  </div>
  <div class="nav-search">
    <div id="search-wrap">
      <input type="text" id="search-input" placeholder="TXID / 블록 높이 / 주소 검색..." autocomplete="off" spellcheck="false">
      <div id="search-hint">
        <span>TXID 64자리</span>
        <span class="hint-sep">·</span>
        <span>블록 높이</span>
        <span class="hint-sep">·</span>
        <span>비트코인 주소</span>
      </div>
      <kbd class="search-shortcut" id="search-shortcut">/</kbd>
      <button id="search-btn" onclick="App.doSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.35" y2="16.35"/></svg></button>
    </div>
  </div>
</header>

<!-- Top Stats Bar -->
<div id="stats-bar">
  <div class="stat"><span class="stat-val" id="s-block">—</span><span class="stat-lbl" data-ko="블록 높이" data-en="Block Height" data-ja="ブロック高" data-ja="ブロック高">블록 높이</span></div>
  <div class="stat"><span class="stat-val" id="s-tx">—</span><span class="stat-lbl" data-ko="미확인 TX" data-en="Unconfirmed TX" data-ja="未確認TX" data-ja="未確認TX">미확인 TX</span></div>
  <div class="stat"><span class="stat-val" id="s-size">—</span><span class="stat-lbl" data-ko="멤풀 크기" data-en="Mempool Size" data-ja="メンプール" data-ja="メンプール">멤풀 크기</span></div>
  <div class="stat"><span class="stat-val" id="s-fee">—</span><span class="stat-lbl" data-ko="빠른 수수료" data-en="Fast Fee" data-ja="速い手数料" data-ja="速い手数料">빠른 수수료</span></div>
</div>

<!-- Main Content Area -->
<main id="app"></main>

<!-- Footer -->
<footer>
  <div class="footer-inner">
    <span id="tagline">비트코인, 오스트리아 경제학, 그리고 자유.</span>
    <div class="footer-live">
      <span data-ko="블록" data-en="Block" data-ja="ブロック">블록</span> <span id="footer-height">—</span>
      ·
      <span data-ko="멤풀" data-en="Mempool" data-ja="メンプール">멤풀</span> <span id="footer-mempool">—</span>
    </div>
    <div class="footer-links">
      <a href="https://learn.txid.uk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" style="vertical-align:middle;margin-right:4px"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span data-ko="공부방" data-en="Learn" data-ja="学習" data-ja="学習">공부방</span></a>
      <a href="https://x.com/bc1qwerty" target="_blank">𝕏</a>
    </div>
  </div>
</footer>

<!-- Mobile Bottom Nav -->
<nav id="mobile-bottom-nav">
  <a href="#/" data-page="" class="mnav-item active">
    <span class="mnav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
    <span class="mnav-label" data-ko="홈" data-en="Home" data-ja="ホーム" data-ja="ホーム">홈</span>
  </a>
  <a href="javascript:void(0)" onclick="App.openMobileSearch()" class="mnav-item">
    <span class="mnav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.35" y2="16.35"/></svg></span>
    <span class="mnav-label" data-ko="검색" data-en="Search" data-ja="検索" data-ja="検索">검색</span>
  </a>
  <a href="#/mining" data-page="mining" class="mnav-item">
    <span class="mnav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M14 10-8.5 8.5c-.83.83-.83 2.17 0 3 .83.83 2.17.83 3 0L17 13"/><path d="M15 11 9 5"/><path d="m16 2-4 4"/><path d="m22 8-4-4"/></svg></span>
    <span class="mnav-label" data-ko="채굴" data-en="Mining" data-ja="マイニング" data-ja="マイニング">채굴</span>
  </a>
</nav>

<!-- Mobile Search Overlay -->
<div id="mobile-search-overlay" class="mobile-search-overlay">
  <div class="mobile-search-inner">
    <input type="text" id="mobile-search-input" placeholder="TXID / 블록 높이 / 주소 검색..." autocomplete="off" spellcheck="false">
    <button onclick="App.closeMobileSearch()">✕</button>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Fee Calculator Floating Button -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="mempool.js"></script>
<script src="app.js"></script>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
