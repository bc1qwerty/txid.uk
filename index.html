<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>txid.uk</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #e8e8e8;
  font-family: 'SF Mono', 'Fira Code', monospace;
  overflow: hidden;
  height: 100vh;
}

canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0.85;
}

/* 상단 HUD */
#hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  background: linear-gradient(to bottom, rgba(10,10,10,0.95), transparent);
  z-index: 10;
}
#hud .logo {
  font-size: 1.1rem;
  color: #f7931a;
  font-weight: 700;
  letter-spacing: 0.05em;
}
#stats {
  display: flex;
  gap: 24px;
  font-size: 0.75rem;
  color: #aaa;
}
#stats span { display: flex; flex-direction: column; align-items: flex-end; }
#stats span strong {
  color: #f7931a;
  font-size: 0.9rem;
}
#lang-btn {
  background: none;
  border: 1px solid #333;
  color: #888;
  font-family: inherit;
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
#lang-btn:hover { border-color: #f7931a; color: #f7931a; }

/* 하단 허브 */
#hub {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 20px 24px;
  background: linear-gradient(to top, rgba(10,10,10,0.97), transparent);
  z-index: 10;
}
#hub-inner {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.hub-tagline {
  font-size: 0.8rem;
  color: #666;
  flex: 1;
}
.hub-links {
  display: flex;
  gap: 12px;
}
.hub-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 20px;
  border: 1px solid #222;
  border-radius: 8px;
  text-decoration: none;
  color: #aaa;
  font-size: 0.75rem;
  transition: all 0.2s;
  background: rgba(10,10,10,0.8);
}
.hub-link:hover { border-color: #f7931a; color: #f7931a; }
.hub-link .icon { font-size: 1.2rem; margin-bottom: 4px; }
.hub-link.soon { opacity: 0.4; pointer-events: none; }

/* 멤풀 info 팝업 */
#mempool-info {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(10,10,10,0.95);
  border: 1px solid #222;
  border-radius: 12px;
  padding: 20px 28px;
  z-index: 20;
  font-size: 0.8rem;
  color: #888;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
#mempool-info.show { opacity: 1; }
#mempool-info .block-height {
  font-size: 1.8rem;
  color: #f7931a;
  font-weight: 700;
  display: block;
}
#mempool-info .label { font-size: 0.7rem; color: #555; margin-top: 4px; }

/* 수수료 */
#fee-bar {
  position: fixed;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 10;
  font-size: 0.7rem;
}
.fee-item {
  background: rgba(10,10,10,0.9);
  border: 1px solid #222;
  border-radius: 6px;
  padding: 8px 12px;
  text-align: right;
}
.fee-item .fee-label { color: #555; font-size: 0.65rem; }
.fee-item .fee-val { color: #f7931a; font-size: 0.9rem; font-weight: 700; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div class="logo">txid.uk</div>
  <div id="stats">
    <span><strong id="s-block">—</strong><span data-ko="블록 높이" data-en="Block Height"></span></span>
    <span><strong id="s-txcount">—</strong><span data-ko="미확인 TX" data-en="Unconfirmed TX"></span></span>
    <span><strong id="s-size">—</strong><span data-ko="멤풀 크기" data-en="Mempool Size"></span></span>
  </div>
  <button id="lang-btn" onclick="toggleLang()">EN</button>
</div>

<div id="fee-bar">
  <div class="fee-item">
    <div class="fee-label" data-ko="빠름" data-en="Fast">빠름</div>
    <div class="fee-val"><span id="fee-fast">—</span> sat/vB</div>
  </div>
  <div class="fee-item">
    <div class="fee-label" data-ko="보통" data-en="Normal">보통</div>
    <div class="fee-val"><span id="fee-mid">—</span> sat/vB</div>
  </div>
  <div class="fee-item">
    <div class="fee-label" data-ko="느림" data-en="Slow">느림</div>
    <div class="fee-val"><span id="fee-slow">—</span> sat/vB</div>
  </div>
</div>

<div id="hub">
  <div id="hub-inner">
    <div class="hub-tagline" id="tagline">비트코인, 오스트리아 경제학, 그리고 자유.</div>
    <div class="hub-links">
      <a href="https://learn.txid.uk" class="hub-link">
        <span class="icon">📚</span>
        <span data-ko="공부방" data-en="Learn"></span>
      </a>
      <a href="#" class="hub-link soon">
        <span class="icon">🛠️</span>
        <span data-ko="앱스" data-en="Apps"></span>
      </a>
      <a href="https://x.com/bc1qwerty" class="hub-link" target="_blank">
        <span class="icon">𝕏</span>
        <span>X</span>
      </a>
      <a href="https://github.com/bc1qwerty" class="hub-link" target="_blank">
        <span class="icon">⌨</span>
        <span>GitHub</span>
      </a>
    </div>
  </div>
</div>

<script>
// ── 언어 ──
let lang = 'ko';
function toggleLang() {
  lang = lang === 'ko' ? 'en' : 'ko';
  document.getElementById('lang-btn').textContent = lang === 'ko' ? 'EN' : 'KO';
  document.getElementById('tagline').textContent = lang === 'ko'
    ? '비트코인, 오스트리아 경제학, 그리고 자유.'
    : 'Bitcoin, Austrian Economics, and Liberty.';
  document.querySelectorAll('[data-ko]').forEach(el => {
    el.textContent = lang === 'ko' ? el.dataset.ko : el.dataset.en;
  });
}

// ── Canvas 멤풀 시각화 ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// TX 입자들
const particles = [];
const MAX_P = 300;

class Particle {
  constructor() { this.reset(true); }
  reset(init = false) {
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : canvas.height + 10;
    this.size = Math.random() * 3 + 1;
    this.speed = Math.random() * 0.4 + 0.1;
    this.opacity = Math.random() * 0.6 + 0.2;
    this.color = Math.random() > 0.85 ? '#f7931a' : `hsl(${200 + Math.random()*40}, 40%, ${30 + Math.random()*20}%)`;
    this.fee = Math.floor(Math.random() * 80 + 1);
    this.confirmed = false;
  }
  update() {
    this.y -= this.speed;
    if (this.y < -10) this.reset();
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 4;
    ctx.fillRect(this.x, this.y, this.size, this.size);
    ctx.restore();
  }
}

for (let i = 0; i < MAX_P; i++) particles.push(new Particle());

// 블록 시각화
const blocks = [];
class Block {
  constructor(x, y, w, h, num) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.num = num;
    this.opacity = 0;
    this.targetOpacity = 0.15;
  }
  update() {
    this.opacity += (this.targetOpacity - this.opacity) * 0.02;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.strokeStyle = '#f7931a';
    ctx.lineWidth = 1;
    ctx.strokeRect(this.x, this.y, this.w, this.h);
    ctx.globalAlpha = this.opacity * 0.3;
    ctx.fillStyle = '#f7931a';
    ctx.fillRect(this.x, this.y, this.w, this.h);
    ctx.restore();
  }
}

// 블록 그리드 생성
function initBlocks(blockHeight) {
  blocks.length = 0;
  const cols = 6, rows = 4;
  const bw = 120, bh = 80, gx = 160, gy = 110;
  const startX = (canvas.width - cols * gx) / 2;
  const startY = (canvas.height - rows * gy) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const n = blockHeight - (r * cols + c);
      blocks.push(new Block(startX + c * gx, startY + r * gy, bw, bh, n));
    }
  }
}
initBlocks(887000);

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 그라디언트 배경
  const grad = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, 0,
    canvas.width/2, canvas.height/2, canvas.width * 0.7
  );
  grad.addColorStop(0, 'rgba(20,12,0,0.95)');
  grad.addColorStop(1, 'rgba(5,5,10,0.98)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  blocks.forEach(b => { b.update(); b.draw(); });
  particles.forEach(p => { p.update(); p.draw(); });

  requestAnimationFrame(animate);
}
animate();

// ── API 데이터 ──
async function fetchData() {
  try {
    const [mempoolRes, feesRes, blockRes] = await Promise.all([
      fetch('https://mempool.space/api/mempool'),
      fetch('https://mempool.space/api/v1/fees/recommended'),
      fetch('https://mempool.space/api/blocks/tip/height'),
    ]);
    const mempool = await mempoolRes.json();
    const fees = await feesRes.json();
    const blockHeight = await blockRes.json();

    document.getElementById('s-block').textContent = blockHeight.toLocaleString();
    document.getElementById('s-txcount').textContent = mempool.count.toLocaleString();
    document.getElementById('s-size').textContent = (mempool.vsize / 1e6).toFixed(1) + ' MB';
    document.getElementById('fee-fast').textContent = fees.fastestFee;
    document.getElementById('fee-mid').textContent = fees.halfHourFee;
    document.getElementById('fee-slow').textContent = fees.economyFee;

    // 블록 그리드 업데이트
    initBlocks(blockHeight);

    // 멤풀 혼잡도에 따라 파티클 속도 조정
    const congestion = Math.min(mempool.count / 50000, 1);
    particles.forEach(p => {
      p.speed = (Math.random() * 0.4 + 0.1) * (1 + congestion);
    });

  } catch(e) { console.error('API 오류:', e); }
}

fetchData();
setInterval(fetchData, 30000); // 30초마다 갱신
</script>
</body>
</html>
