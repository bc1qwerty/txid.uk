<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>txid.uk — Bitcoin Block Explorer</title>
<meta name="description" content="Bitcoin Block Explorer & Mempool Viewer. 비트코인 블록 탐색기 & 멤풀 뷰어.">
<meta name="theme-color" content="#f7931a">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
</head>
<body>

<!-- Header -->
<header id="header">
  <nav>
    <a href="#/" class="logo">txid.uk</a>
    <div id="search-wrap">
      <input type="text" id="search-input" placeholder="TXID / 블록 높이 / 주소 검색..." autocomplete="off" spellcheck="false">
      <kbd class="search-shortcut" id="search-shortcut">/</kbd>
      <button id="search-btn" onclick="App.doSearch()">🔍</button>
    </div>
    <div class="nav-right">
      <div id="nav-links">
        <a href="#/" data-page="" data-ko="홈" data-en="Home">홈</a>
        <a href="#/mining" data-page="mining" data-ko="채굴" data-en="Mining">채굴</a>
      </div>
      <span id="monitor-badge" class="monitor-badge" style="display:none" title="모니터링 중">0</span>
      <button id="lang-btn" onclick="App.toggleLang()">EN</button>
    </div>
  </nav>
</header>

<!-- Top Stats Bar -->
<div id="stats-bar">
  <div class="stat"><span class="stat-val" id="s-block">—</span><span class="stat-lbl" data-ko="블록 높이" data-en="Block Height">블록 높이</span></div>
  <div class="stat"><span class="stat-val" id="s-tx">—</span><span class="stat-lbl" data-ko="미확인 TX" data-en="Unconfirmed TX">미확인 TX</span></div>
  <div class="stat"><span class="stat-val" id="s-size">—</span><span class="stat-lbl" data-ko="멤풀 크기" data-en="Mempool Size">멤풀 크기</span></div>
  <div class="stat"><span class="stat-val" id="s-fee">—</span><span class="stat-lbl" data-ko="빠른 수수료" data-en="Fast Fee">빠른 수수료</span></div>
</div>

<!-- Main Content Area -->
<main id="app"></main>

<!-- Footer -->
<footer>
  <div class="footer-inner">
    <span id="tagline">비트코인, 오스트리아 경제학, 그리고 자유.</span>
    <div class="footer-links">
      <a href="https://learn.txid.uk">📚 <span data-ko="공부방" data-en="Learn">공부방</span></a>
      <a href="https://x.com/bc1qwerty" target="_blank">𝕏</a>
      <a href="https://github.com/bc1qwerty" target="_blank">GitHub</a>
    </div>
  </div>
</footer>

<!-- Mobile Bottom Nav -->
<nav id="mobile-bottom-nav">
  <a href="#/" data-page="" class="mnav-item active">
    <span class="mnav-icon">🏠</span>
    <span class="mnav-label" data-ko="홈" data-en="Home">홈</span>
  </a>
  <a href="javascript:void(0)" onclick="App.openMobileSearch()" class="mnav-item">
    <span class="mnav-icon">🔍</span>
    <span class="mnav-label" data-ko="검색" data-en="Search">검색</span>
  </a>
  <a href="#/mining" data-page="mining" class="mnav-item">
    <span class="mnav-icon">⛏️</span>
    <span class="mnav-label" data-ko="채굴" data-en="Mining">채굴</span>
  </a>
</nav>

<!-- Mobile Search Overlay -->
<div id="mobile-search-overlay" class="mobile-search-overlay">
  <div class="mobile-search-inner">
    <input type="text" id="mobile-search-input" placeholder="TXID / 블록 높이 / 주소 검색..." autocomplete="off" spellcheck="false">
    <button onclick="App.closeMobileSearch()">✕</button>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Fee Calculator Floating Button -->
<button id="fee-calc-btn" onclick="App.openFeeCalc()" title="수수료 계산기">🧮</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="mempool.js"></script>
<script src="app.js"></script>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
